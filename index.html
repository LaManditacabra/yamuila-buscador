<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yamuila Buscador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen text-slate-900">
    <header class="glass border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                </div>
                <span class="text-2xl font-extrabold tracking-tight text-slate-900">Yamuila <span class="text-indigo-600">Buscador</span></span>
            </div>
            <p class="text-sm font-medium text-slate-500 hidden sm:block italic">El comparador inteligente de ofertas</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <!-- Search Section -->
        <section class="mb-12">
            <div class="bg-slate-900 rounded-[2.5rem] p-8 md:p-16 shadow-2xl shadow-slate-200 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-indigo-500/20 rounded-full blur-3xl -mr-20 -mt-20"></div>
                <div class="relative z-10 max-w-2xl">
                    <h2 class="text-4xl md:text-5xl font-extrabold text-white mb-8 leading-tight">Busca, compara y <span class="text-indigo-400">ahorra dinero</span>.</h2>
                    <div class="flex flex-col md:flex-row gap-4 bg-white/10 p-2 rounded-[2rem] border border-white/10 backdrop-blur-sm">
                        <input type="text" id="searchInput" placeholder="¿Qué estás buscando hoy?" 
                            class="flex-1 bg-transparent px-6 py-4 text-white placeholder-slate-400 text-lg outline-none border-none">
                        
                        <select id="countrySelect" class="bg-slate-800 text-white px-6 py-4 rounded-2xl font-semibold outline-none border-none cursor-pointer hover:bg-slate-700 transition">
                            <option value="com.ar">Argentina</option>
                            <option value="com.mx">México</option>
                            <option value="cl">Chile</option>
                            <option value="com.co">Colombia</option>
                        </select>

                        <button onclick="performSearch()" class="bg-indigo-600 text-white font-bold px-10 py-4 rounded-2xl hover:bg-indigo-500 transition-all shadow-lg shadow-indigo-500/25 active:scale-95">
                            Encontrar ofertas
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Results Section -->
        <div id="loader" class="hidden flex flex-col items-center py-20">
            <div class="w-14 h-14 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-6 text-slate-500 font-semibold tracking-wide uppercase text-xs">Analizando el mercado...</p>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Items go here -->
        </div>

        <div id="emptyState" class="text-center py-20">
            <div class="bg-slate-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-12 h-12 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-slate-900">Empieza tu ahorro</h3>
            <p class="text-slate-500 mt-2">Busca un producto para ver las mejores opciones disponibles.</p>
        </div>
    </main>

    <script>
        async function performSearch() {
            const query = document.getElementById('searchInput').value;
            const country = document.getElementById('countrySelect').value;
            const grid = document.getElementById('resultsGrid');
            const loader = document.getElementById('loader');
            const empty = document.getElementById('emptyState');

            if (!query || query.trim().length < 2) return;

            grid.innerHTML = '';
            empty.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}&country=${country}`);
                
                loader.classList.add('hidden');

                if (!response.ok) {
                    alert(`Error del servidor (${response.status}). Revisa la terminal de Python para ver el error detallado.`);
                    return;
                }

                const data = await response.json();
                const items = Array.isArray(data) ? data : (data.items || []);

                if (items.length === 0) {
                    empty.classList.remove('hidden');
                    empty.querySelector('h3').innerText = "No encontramos resultados";
                    return;
                }

                items.forEach(item => {
                    grid.innerHTML += `
                        <div class="group bg-white rounded-[2rem] overflow-hidden shadow-sm hover:shadow-2xl hover:shadow-indigo-100 transition-all duration-500 border border-slate-100 flex flex-col">
                            <div class="relative bg-slate-50 p-6 overflow-hidden aspect-square flex items-center justify-center">
                                <img src="${item.image}" class="max-w-full max-h-full object-contain group-hover:scale-110 transition-transform duration-700">
                                <div class="absolute top-4 left-4">
                                    <span class="text-[10px] font-extrabold text-indigo-700 bg-white/90 backdrop-blur px-3 py-1.5 rounded-full shadow-sm uppercase tracking-widest border border-indigo-50">${item.store}</span>
                                </div>
                            </div>
                            <div class="p-6 flex flex-col flex-1">
                                <h4 class="font-bold text-slate-800 text-sm line-clamp-2 mb-4 leading-relaxed group-hover:text-indigo-600 transition-colors">${item.name}</h4>
                                <div class="mt-auto flex items-end justify-between gap-2">
                                    <div class="flex flex-col">
                                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Mejor precio</span>
                                        <span class="text-2xl font-black text-slate-900">$${item.price.toLocaleString(undefined, {maximumFractionDigits: 0})}</span>
                                        ${item.original_currency && item.original_currency !== item.currency ? `
                                            <span class="text-[11px] font-bold text-indigo-500 mt-0.5">
                                                Original: ${item.original_currency === 'USD' ? 'U$S' : item.original_currency} ${item.original_price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                                            </span>
                                        ` : ''}
                                    </div>
                                    <a href="${item.link}" target="_blank" class="bg-slate-900 text-white p-3.5 rounded-2xl hover:bg-indigo-600 transition-all duration-300 transform active:scale-90">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                                    </a>
                                </div>
                            </div>
                        </div>`;
                });
            } catch (e) {
                loader.classList.add('hidden');
                alert("Error al conectar con el backend. ¿Está corriendo el servidor Python?");
            }
        }
    </script>
</body>
</html>
